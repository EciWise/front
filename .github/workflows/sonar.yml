name: SonarQube Analysis

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for blame/SCM)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # npm run test:coverage = ng test --watch=false --coverage
      # Con coverageReporters:[lcov] en angular.json genera coverage/ECIWISE-Front/lcov.info
      - name: Run tests with LCOV coverage
        run: npm run test:coverage
        env:
          AUTH_SERVICE: http://localhost:3001
          STUDY_SERVICE: http://localhost:8082
          TALK_SERVICE: http://localhost:3003
          TALK_WS: ws://localhost:3003/ws/chat
          TODO_SERVICE: http://localhost:8083
          GAME_WS: ws://localhost:3002/ws/game

      # Se salta si SONAR_TOKEN no está configurado en los secrets del repo.
      # Para activarlo: Settings → Secrets → Actions → New repository secret:
      #   SONAR_TOKEN    → token generado en tu instancia SonarQube/SonarCloud
      #   SONAR_HOST_URL → p.ej. https://sonarcloud.io  (SonarCloud)
      #                         o https://sonar.tudominio.com  (self-hosted)
      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
