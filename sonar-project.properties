sonar.projectKey=eciwise-front
sonar.projectName=ECIWISE-Front
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=**/node_modules/**,dist/**,.angular/**,coverage/**,**/*.spec.ts
sonar.sourceEncoding=UTF-8

# Los ficheros de traducción i18n son DATOS: en.ts y es.ts comparten exactamente
# la misma estructura de claves (es su razón de ser), así que el detector de
# duplicación los marca al 98%. No es código duplicado real y no puede unificarse
# sin romper i18n -> se excluyen de la detección de copia/pega.
sonar.cpd.exclusions=**/core/i18n/translations/**

# S2068 (hard-coded password) sobre las etiquetas de UI "password" de i18n es un
# falso positivo: son textos traducibles, no credenciales.
sonar.issue.ignore.multicriteria=i18npwd
sonar.issue.ignore.multicriteria.i18npwd.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.i18npwd.resourceKey=**/core/i18n/translations/**
