<!-- Orbes de aurora difuminados (tintes de marca). El nº visible lo controla el
     CSS según la variante: `auth` oculta los últimos para un fondo más sobrio. -->
<div class="aurora__orbs" aria-hidden="true">
  <span class="aurora__orb aurora__orb--red"></span>
  <span class="aurora__orb aurora__orb--wine"></span>
  <span class="aurora__orb aurora__orb--pink"></span>
  <span class="aurora__orb aurora__orb--purple"></span>
  <span class="aurora__orb aurora__orb--red-soft"></span>
  <span class="aurora__orb aurora__orb--wine-2"></span>
</div>

<!-- Escena 3D (Three.js): estrellas + símbolos académicos flotando con
     movimiento. Se inicializa solo en el navegador (ver el componente). -->
<canvas #canvas class="aurora__canvas" aria-hidden="true"></canvas>
