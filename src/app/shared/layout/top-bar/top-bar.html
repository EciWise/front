<header class="top-bar">
  <eci-math-decor variant="bar" />

  <div class="top-bar__left">
    <button
      type="button"
      class="icon-button top-bar__menu"
      (click)="menuToggle.emit()"
      [attr.aria-label]="'nav.dashboard' | translate"
    >
      <svg lucideMenu [size]="22" aria-hidden="true"></svg>
    </button>
    <eci-logo [home]="home()" />
  </div>

  <div class="top-bar__right">
    <eci-language-switch />
    <eci-theme-toggle />
    <eci-a11y-toggle />
    <eci-notifications-bell />

    @if (user(); as currentUser) {
      <div class="top-bar__profile">
        <a
          class="top-bar__user"
          [routerLink]="profileLink()"
          [attr.aria-label]="'nav.profile' | translate"
          [title]="'nav.profile' | translate"
        >
          <eci-avatar [name]="currentUser.name" [src]="currentUser.avatarUrl" [size]="34" />
          <span class="top-bar__name">{{ currentUser.name }}</span>
        </a>
        <button
          type="button"
          class="icon-button"
          (click)="logout()"
          [attr.aria-label]="'common.logout' | translate"
        >
          <svg lucideLogOut [size]="20" aria-hidden="true"></svg>
        </button>
      </div>
    }
  </div>
</header>
