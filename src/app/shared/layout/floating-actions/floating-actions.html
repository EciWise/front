@if (active(); as panel) {
  <!-- Captura clics fuera del panel para cerrarlo, sin oscurecer la pantalla. -->
  <div class="dock-backdrop" (click)="close()" aria-hidden="true"></div>
  <dialog
    class="dock"
    open
    [style.width.px]="width()"
    [attr.aria-label]="(panel === 'assistant' ? 'floating.assistant' : 'floating.chat') | translate"
  >
    <button
      type="button"
      class="dock__resize"
      (pointerdown)="startResize($event)"
      [attr.aria-label]="'common.resize' | translate"
    ></button>
    <header class="dock__header">
      <h2 class="dock__title">
        {{ (panel === 'assistant' ? 'floating.assistant' : 'floating.chat') | translate }}
      </h2>
      <button
        type="button"
        class="icon-button"
        (click)="close()"
        [attr.aria-label]="'common.cancel' | translate"
      >
        <svg lucideX [size]="18" aria-hidden="true"></svg>
      </button>
    </header>
    <div class="dock__body">
      @if (panel === 'assistant') {
        <eci-ai-assistant-panel />
      } @else {
        <eci-chat-panel />
      }
    </div>
  </dialog>
} @else {
  <div class="fab-group" [class.fab-group--expanded]="expanded()">
    <button
      type="button"
      class="fab fab--reveal fab--chat"
      [attr.tabindex]="expanded() ? 0 : -1"
      [attr.aria-hidden]="!expanded()"
      (click)="open('chat')"
      [attr.aria-label]="'floating.chat' | translate"
    >
      <svg lucideMessageCircle [size]="24" aria-hidden="true"></svg>
    </button>
    <button
      type="button"
      class="fab fab--reveal fab--assistant"
      [attr.tabindex]="expanded() ? 0 : -1"
      [attr.aria-hidden]="!expanded()"
      (click)="open('assistant')"
      [attr.aria-label]="'floating.assistant' | translate"
    >
      <svg lucideBot [size]="24" aria-hidden="true"></svg>
    </button>
    <button
      type="button"
      class="fab fab--primary fab--toggle"
      [class.fab--toggle-open]="expanded()"
      (click)="toggle()"
      [attr.aria-expanded]="expanded()"
      [attr.aria-label]="'floating.menu' | translate"
    >
      <svg lucidePlus [size]="24" aria-hidden="true"></svg>
    </button>
  </div>
}
