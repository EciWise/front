<a class="skip-link" href="#main-content">{{ 'a11y.skipToContent' | translate }}</a>

<eci-top-bar (menuToggle)="toggleNav()" />

<div class="shell">
  @if (!immersive()) {
    <eci-math-decor variant="frame" />
  }

  <aside class="shell__nav" [class.shell__nav--open]="navOpen()">
    <eci-side-nav (click)="closeNav()" />
  </aside>

  @if (navOpen()) {
    <button
      type="button"
      class="shell__overlay"
      [attr.aria-label]="'a11y.closeMenu' | translate"
      (click)="closeNav()"
    ></button>
  }

  <main
    id="main-content"
    class="shell__main"
    [class.shell__main--bleed]="immersive()"
    tabindex="-1"
  >
    <router-outlet />
  </main>
</div>

@if (!immersive()) {
  <eci-floating-actions />
}

@if (mustChangePassword()) {
  <eci-force-password-change />
}

<eci-achievement-toast />
