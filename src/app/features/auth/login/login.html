<main class="auth" id="main-content" tabindex="-1">
  <eci-aurora-background variant="auth" />

  <header class="auth__bar">
    <eci-logo home="/" />
    <div class="auth__controls">
      <eci-language-switch />
      <eci-theme-toggle />
      <eci-a11y-toggle />
    </div>
  </header>

  <div class="auth__main">
    <section class="auth__card">
      <h1 class="auth__title">{{ 'auth.loginTitle' | translate }}</h1>

      <form class="auth__form" [formGroup]="form" (ngSubmit)="submit()">
        <label class="auth__field">
          <span>{{ 'common.email' | translate }}</span>
          <input type="email" formControlName="email" autocomplete="email" />
        </label>
        <label class="auth__field">
          <span>{{ 'common.password' | translate }}</span>
          <input type="password" formControlName="password" autocomplete="current-password" />
        </label>

        @if (errorKey(); as err) {
          <p class="auth__error" role="alert">{{ err | translate }}</p>
        }

        <eci-button type="submit" [block]="true" [disabled]="loading()">
          {{ 'common.login' | translate }}
        </eci-button>
      </form>

      <div class="auth__divider">
        <span>{{ 'auth.or' | translate }}</span>
      </div>

      <eci-button variant="secondary" [block]="true" (click)="loginWithGoogle()">
        {{ 'auth.withGoogle' | translate }}
      </eci-button>

      <p class="auth__switch">
        {{ 'auth.noAccount' | translate }}
        <a routerLink="/auth/register">{{ 'common.register' | translate }}</a>
      </p>
    </section>
  </div>
</main>
