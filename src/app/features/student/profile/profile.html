<div class="eci-fit">
  <eci-page-header titleKey="profile.title" icon="profile" />

  <div class="eci-fit__body">
@if (user(); as currentUser) {
  <eci-card>
    <div class="profile__head">
      <eci-avatar [name]="currentUser.name" [src]="currentUser.avatarUrl" [size]="72" />
      <div class="profile__head-info">
        <span class="profile__head-name">{{ currentUser.name }}</span>
        <span class="profile__head-email">{{ currentUser.email }}</span>
      </div>
    </div>

    <form class="profile" [formGroup]="form" (ngSubmit)="save()">
      <label class="profile__field">
        <span>{{ 'common.name' | translate }}</span>
        <input type="text" formControlName="name" autocomplete="name" />
      </label>

      <label class="profile__field">
        <span>{{ 'common.email' | translate }}</span>
        <input type="email" [value]="currentUser.email" disabled />
      </label>

      <label class="profile__field">
        <span>{{ 'common.program' | translate }}</span>
        <input type="text" formControlName="program" autocomplete="off" />
      </label>

      <label class="profile__field">
        <span>{{ 'profile.role' | translate }}</span>
        <input type="text" [value]="currentUser.role" disabled />
      </label>

      @if (saved()) {
        <output class="profile__saved" aria-live="polite">{{ 'profile.saved' | translate }}</output>
      }

      <eci-button type="submit">{{ 'profile.save' | translate }}</eci-button>
    </form>
  </eci-card>
}
  </div>
</div>
